<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- tailwindcss  -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        *{
             font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <!-- Navbar -->
<nav class="flex flex-col sm:flex-row justify-between items-center mb-6 bg-white p-4 rounded-lg shadow">
    <div class="flex items-center space-x-2 mb-2 sm:mb-0">
        <!-- logo -->
        <img src="./assets/github-logo.png" alt="Logo" class="h-8 w-8">
        <span class="text-xl font-bold text-gray-800">GitHub Issues Tracker</span>
    </div>
    <div class="flex w-full sm:w-auto">
        <input type="text" id="search-input" placeholder="Search issues..." 
               class="border border-gray-300 p-2 rounded-l-lg flex-grow focus:outline-none focus:border-blue-500">
        <button id="search-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 ml-2 ">+ New Issue</button>
       
    </div>
</nav>

        <!-- Tabs -->
        <div class="bg-white p-4 rounded-lg shadow mb-4">
            <div class="flex space-x-4 border-b">
                <button data-tab="all" class="tab-btn px-4 py-2 font-semibold text-white bg-blue-600 active">All</button>
                <button data-tab="open" class="tab-btn px-4 py-2 font-semibold text-gray-500 ">Open</button>
                <button data-tab="closed" class="tab-btn px-4 py-2 font-semibold text-gray-500 ">Closed</button>
            </div>

            <!-- Stats Bar -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mt-4 text-sm text-gray-600">
                <div class="flex items-center space-x-2">
                    <span class="bg-gray-200 p-2 rounded-full"><img src="./assets/Aperture.png" alt=""></span>
                    <span class="font-bold text-lg" id="issue-count">0</span>
                    <span class="text-gray-700">Issues</span>
                    <span class="text-gray-500 ml-2">Track and manage your project issues</span>
                </div>
                <div class="flex space-x-4 mt-2 sm:mt-0">
                    <span class="flex items-center"><span class="w-3 h-3 bg-green-500 rounded-full mr-1"></span> Open</span>
                    <span class="flex items-center"><span class="w-3 h-3 bg-purple-500 rounded-full mr-1"></span> Closed</span>
                </div>
            </div>
        </div>

        <!-- Issues Grid -->
        <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            
        </div>

        <!-- Loading Spinner -->
        <div id="loading-spinner" class="hidden fixed top-0 left-0 w-full h-full bg-gray-900 bg-opacity-50 flex items-center justify-center z-50">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
        </div>

        <!-- Modal -->
        <div id="issue-modal" class="hidden fixed top-0 left-0 w-full h-full bg-gray-900 bg-opacity-50 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-lg p-6 max-w-lg w-full max-h-full overflow-y-auto">
                <div id="modal-content" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
