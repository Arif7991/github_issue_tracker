<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <!-- tailwindcss  -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- style   -->
 <style>
    *{
        font-family: "Geist", sans-serif;
    }
 </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <!-- Logo / Title -->
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">GitHub Issues Tracker</h1>
        <p class="text-center text-gray-600 mb-6">Sign in to manage your issues</p>

        <!-- Login Form -->
        <form id="login-form" onsubmit="event.preventDefault(); handleLogin();">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="username">Username</label>
                <input type="text" id="username" placeholder="Enter Username" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                <p class="text-xs text-gray-500 mt-1">Default: admin</p>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Password" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                <p class="text-xs text-gray-500 mt-1">Default: admin123</p>
            </div>
            <button type="submit" 
                    class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200">
                Sign In
            </button>
        </form>

        <!-- OR Separator -->
        <div class="flex items-center my-4">
            <hr class="flex-grow border-gray-300">
            <span class="px-3 text-gray-500">OR</span>
            <hr class="flex-grow border-gray-300">
        </div>

        <!-- Demo Credentials -->
        <div class="text-center text-sm text-gray-600">
            <p><span class="font-semibold">Demo Credentials:</span></p>
            <p>Username: admin</p>
            <p>Password: admin123</p>
        </div>
    </div>

    <script>
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username === 'admin' && password === 'admin123') {
                window.location.href = 'dashboard.html'; // Redirect to main page
            } else {
                alert('Invalid credentials. Use admin/admin123');
            }
        }
    </script>
</body>
</html>
